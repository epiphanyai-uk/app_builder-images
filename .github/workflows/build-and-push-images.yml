name: Build and Push Images (GHCR, public)

# This repo exists only to host this workflow. Images built here are pushed
# under this repo's own public GHCR namespace, so the resulting packages are
# public from creation -- GitHub does not allow making a package public if
# it's owned by a private repository, which is why the source build used to
# happen (and images ended up stuck private) in the private app_builder repo
# itself. Keeping the workflow here, checking out the private source via a
# PAT, sidesteps that restriction entirely without making app_builder public.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: frontend
            context: ./frontend
            file: frontend/Dockerfile
          - image: backend
            context: .
            file: backend/Dockerfile
          - image: appbuilder
            context: .
            file: Dockerfile
          - image: claude-worker
            context: .
            file: claude_worker/Dockerfile

    steps:
      - name: Checkout app_builder (private source repo)
        uses: actions/checkout@v4
        with:
          repository: epiphanyai-uk/app_builder
          token: ${{ secrets.CHECKOUT_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/epiphanyai-uk/app_builder-images/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
